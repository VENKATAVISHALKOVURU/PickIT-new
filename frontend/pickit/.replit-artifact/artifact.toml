kind = "web"
previewPath = "/"
title = "PickIT"
version = "1.0.0"
id = "artifacts/pickit"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20073

[services.development]
run = "pnpm --filter @workspace/pickit run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/pickit", "run", "build" ]
publicDir = "artifacts/pickit/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20073"
BASE_PATH = "/"
